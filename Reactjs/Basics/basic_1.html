<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Basic React</title>
</head>
<body>
    
    <div id="container"></div>

    <!-- React -->
     <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>  

     <!-- React DOM -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script> 

    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        //for now will type our jsx here and babel will translate it into Js so that the Browser can understand

        const Elemt = (
            <div>
                <p>Hello i am a programmer learning React </p>
                <p>And this is the Minimal code requires to Make a React Web Application</p>
                <button>Support</button>
            </div>
        );

        ReactDOM.createRoot(container).render(Elemt);
        // using (); just for safe use of the code so that it look organized and easy to read for the other programmer
    </script>
</body>
</html>
