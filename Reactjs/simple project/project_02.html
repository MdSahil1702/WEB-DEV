<!DOCTYPE html>
<html>

<head>
    <title>Project-02</title>
    <style>
        .buttons{
            background-color: rgb(16, 91, 213);
            color: white;
            border-radius: 4px;
            border: none;
            width: 60px;
            height: 30px;
            margin: 10px;
            margin-top: 0px;
            cursor: pointer;
        }
       .emailinput,.passwordinput{
        height: 20px;
        margin-bottom: 10px;
        margin-right: 10px;
       }
       
    </style>
</head>

<body>
    <div class="js-container"></div>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- React DOM -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


    <script type="text/babel">
      
      
      
     function App(){
        

        const [hide,set_h]=React.useState("false");


       

      function ShowAndHide(){
        if(hide==="true")set_h("false");
        else set_h("true");
      }

      
        return(
            <>
            <p>Hello, welcome to my website</p>

            <div>
                <input type="text" placeholder="Email" className="emailinput"/>
            </div>
            <div>
                {/*hide false then *** like password hidden*/}
                <input type={hide==="false"?"password":"text"} placeholder="Password"
                
                className="passwordinput"
                />
                <button 
                onClick={ShowAndHide}
                >
                    {hide==="false"?"Show":"Hide"}
                </button>
            </div>

            <div>
                <button className="buttons">
                    Login
                </button>
                <button className="buttons">
                    Sign up
                </button>
            </div>
            </>
        );
     }
     const container=document.querySelector(".js-container");
     ReactDOM.createRoot(container).render(<App/>);

    </script>
</body>

</html>
