<html>
    <head>
        <title>
            function with return value
        </title>
    </head>

    <body>
        <script>
            
            function myname(a){
                return `Welcome ${a}`;
            }

            let a='Sahil Siddiqui';
            console.log(myname(a));
            a='Sayem Siddiqui';
            console.log(myname(a));
            a='Again';
            console.log(myname(a));


        </script>
    </body>
</html>
