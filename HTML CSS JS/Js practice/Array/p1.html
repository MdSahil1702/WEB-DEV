<!DOCTYPE html>

<head>
    
    <title>Practice 1</title>
    <link rel="stylesheet" href="p1.css">

</head>
<body>
    
    <div id="maincontainer">

        <div id="title">
            Todo List Practice 1
        </div>
        <div id="action">
            <div>
                <input type="text" id="textt" placeholder="enter your task">
            </div>
            <div>
                <button id="addbutton">Add</button>
            </div>
        </div>
    </div>


    <script >
        const myTasks=[];
        const butt=document.querySelector("#addbutton");
        butt.addEventListener("click",function f(){


            const data = document.querySelector("#textt");
           

            
            myTasks.push(data.value);
            data.value="";
            console.log(myTasks);
        }
        );

        
    </script>
</body>
</html>
