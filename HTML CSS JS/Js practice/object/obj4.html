<!-- Create an object named person with properties: name, age, and city.

Access and log the name property using dot notation.

Access and log the city property using bracket notation. -->

<html>
    <body>
        <script>

        const person={
name: 'sahil',
age: 22,
city: 'Thane'
        };

        console.log(person.name);
        console.log(person.age);
        console.log(person.city);

        console.log(person['name']);
        console.log(person['age']);
        console.log(person['city']);
        
        </script>
    </body>
</html>
