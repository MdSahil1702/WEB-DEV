    <span class="info">Info span</span>

 Tasks:

<html>
    <div class="container">
    <p id="main-text">Hello World</p>
    <span class="info">Info span</span>
</div>


<script >

    
console.log("Selecting the p with 3 different methods");
     const txt=document.getElementById("main-text");

     const txt1=document.querySelector("#main-text");

     const st= document.querySelector(".container");
     const txt2=st.children[0];

    console.log(txt);
    console.log(txt1);
    console.log(txt2);

    console.log("Selecting the <Span> with 2 different methods");

        console.log(document.querySelector(".info")) ;

        

        console.log(document.getElementsByClassName("info")[0]);


</script>
</html>
