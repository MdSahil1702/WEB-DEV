<html>
    <body>
        
        <p>Cart Quantity</p>
        <button onclick="console.log(`Cart Quantity: ${x}`)">
            Show Quantity
        </button>
        <button onclick="x+=1; console.log(`Cart Quantity: ${x}`);">
            Add to cart
        </button>

        <button onclick="x+=2;console.log(`Cart Quantity: ${x}`)"> +2</button>

        <button onclick="x+=3;console.log(`Cart Quantity: ${x}`)">+3</button>
        <button onclick="x=0; console.log(`Cart Quantity: ${x}`)">Reset cart</button>

        <script>
            let x =0;
        </script>
    </body>
</html>
