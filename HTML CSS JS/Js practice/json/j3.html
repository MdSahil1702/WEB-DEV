<!-- You have an object with a property that’s a function and one that’s undefined.
→ Use JSON.stringify() and observe what happens to those properties.-->

<html>
    <body>
        <script>
          
          const obj={
            name:undefined,
            f: function f1(){
                console.log('I am a function f1');
            }
          };
            

          const str=JSON.stringify(obj);
          console.log(str);
        </script>
    </body>
</html>
