<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Table Example</title>
  <style>
    table {
      width: 80%;
      border-collapse: collapse;
      margin: 20px auto;
      font-family: Arial, sans-serif;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #e8f4ff;
    }
    .highlight {
      font-weight: bold;
      color: darkblue;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Student Marks Table</h2>
  <table>
    <tr>
      <th rowspan="2">Roll No</th>
      <th rowspan="2">Name</th>
      <th colspan="3">Subjects</th>
      <th rowspan="2">Total</th>
      <th rowspan="2">Grade</th>
    </tr>
    <tr>
      <th>Math</th>
      <th>Science</th>
      <th>English</th>
    </tr>
    <tr>
      <td>1</td>
      <td>Rahul Sharma</td>
      <td>85</td>
      <td>72</td>
      <td>90</td>
      <td>247</td>
      <td>A</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Priya Singh</td>
      <td>70</td>
      <td>88</td>
      <td>81</td>
      <td>239</td>
      <td>A</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Aman Verma</td>
      <td>92</td>
      <td>89</td>
      <td>95</td>
      <td>276</td>
      <td>A+</td>
    </tr>
    <tr>
      <td>4</td>
      <td class="highlight" rowspan="2">Neha Gupta</td>
      <td>65</td>
      <td>60</td>
      <td>58</td>
      <td>183</td>
      <td>C</td>
    </tr>
    <tr>
      <td>—</td>
      <td>70</td>
      <td>68</td>
      <td>62</td>
      <td>200</td>
      <td>B</td>
    </tr>
    <tr>
      <td>5</td>
      <td>Rohit Kumar</td>
      <td>78</td>
      <td>74</td>
      <td>80</td>
      <td>232</td>
      <td>B+</td>
    </tr>
  </table>
</body>
</html>
