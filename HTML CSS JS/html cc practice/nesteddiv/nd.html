<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="nd.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="cat1.jpg" alt="cat" class="logoimg">
        </div>
        <div class="textcontainer">
            <div>
                <p class="username">oliver</p>
            </div>


            <div>
                <p class="name">the cat</p>
            </div>
            <div>
                <p class="category">Popular</p>
            </div>

        </div>

        <div class="follow">
            <button class="followbutton">Follow</button>
        </div>

    </div>

    <div class="container">
        <div class="logo">
            <img src="cat2.jpg" alt="cat" class="logoimg">
        </div>
        <div class="textcontainer">
            <div>
                <p class="username">Mimi</p>
            </div>


            <div>
                <p class="name">Sleepy cat</p>
            </div>
            <div>
                <p class="category">Popular</p>
            </div>

        </div>

        <div class="follow">
            <button class="followbutton">Follow</button>
        </div>

    </div>

    <div class="container">
        <div class="logo">
            <img src="dog.jpg" alt="cat" class="logoimg">
        </div>
        <div class="textcontainer">
            <div>
                <p class="username">Rex</p>
            </div>


            <div>
                <p class="name">Happy Bulldog</p>
            </div>
            <div>
                <p class="category">Popular</p>
            </div>

        </div>

        <div class="follow">
            <button class="followbutton">Follow</button>
        </div>

    </div>


</body>

</html>
